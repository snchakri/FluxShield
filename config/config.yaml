# Application Configuration
app:
  name: WAFAI
  version: 0.1.0
  debug: false

# Logging Configuration
logging:
  level: INFO
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file: wafai.log

# WAF Configuration
waf:
  enabled: true
  max_request_size: 10485760  # 10MB

# AI Configuration
ai:
  enabled: true
  model: default
  confidence_threshold: 0.8
